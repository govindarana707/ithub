
<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Certificate of Completion</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Georgia', serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .certificate { background: white; width: 800px; height: 600px; padding: 40px; border: 10px solid #gold; border-image: linear-gradient(45deg, #FFD700, #FFA500) 1; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .border { position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 2px solid #FFD700; pointer-events: none; }
        .header { text-align: center; margin-bottom: 30px; }
        .title { font-size: 36px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { font-size: 18px; color: #7f8c8d; font-style: italic; }
        .content { text-align: center; margin: 40px 0; }
        .recipient { font-size: 28px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #FFD700; display: inline-block; padding-bottom: 10px; }
        .course-name { font-size: 24px; color: #34495e; margin-bottom: 20px; font-weight: 600; }
        .description { font-size: 16px; color: #7f8c8d; line-height: 1.6; margin-bottom: 30px; }
        .footer { display: flex; justify-content: space-between; margin-top: 50px; }
        .signature { text-align: center; width: 200px; }
        .signature-line { border-top: 1px solid #34495e; margin-bottom: 5px; }
        .signature-title { font-size: 12px; color: #7f8c8d; }
        .certificate-id { position: absolute; bottom: 20px; right: 40px; font-size: 12px; color: #95a5a6; }
        .seal { position: absolute; bottom: 30px; left: 30px; width: 80px; height: 80px; border: 3px solid #FFD700; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #FFD700; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class='certificate'>
        <div class='border'></div>
        <div class='header'>
            <div class='title'>Certificate of Completion</div>
            <div class='subtitle'>This is to certify that</div>
        </div>
        <div class='content'>
            <div class='recipient'>Alice Student</div>
            <div class='course-name'>Complete Web Development Bootcamp 2024</div>
            <div class='description'>has successfully completed the course requirements and demonstrated proficiency in all subject areas.</div>
        </div>
        <div class='footer'>
            <div class='signature'>
                <div class='signature-line'></div>
                <div class='signature-title'>Instructor Signature</div>
            </div>
            <div class='signature'>
                <div class='signature-line'></div>
                <div class='signature-title'>Date: January 31, 2026</div>
            </div>
        </div>
        <div class='seal'>IT HUB<br>OFFICIAL</div>
        <div class='certificate-id'>Certificate ID: CERT_697E3C0BB35AC</div>
    </div>
</body>
</html>
